name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare System
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
          
      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer cython
          
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          # هذه الخطوات تضمن تحميل الـ SDK و الـ NDK بشكل منفصل عن عملية البناء
          buildozer android update
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
