name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
          
      - name: Setup Build Environment
        run: |
          pip3 install --upgrade buildozer cython
          # إنشاء المجلدات الضرورية يدوياً
          mkdir -p ~/.buildozer/android/platform/android-sdk
          
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
          # توجيه البناء للمسار الذي أنشأناه
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          buildozer --verbose android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
