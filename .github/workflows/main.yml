name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
          
      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer cython
          
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          # هذه الخطوة تجبر buildozer على تحضير بيئة العمل بشكل صحيح
          buildozer android debug || true
          
          # نقوم بتنفيذ البناء مع طلب تفاصيل كاملة لرؤية الخطأ بدقة إذا حدث
          buildozer --verbose android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
