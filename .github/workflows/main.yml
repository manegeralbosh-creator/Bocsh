name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          apt-get update
          apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
          
          # تثبيت أدوات أندرويد المطلوبة يدوياً قبل البناء
          pip install --upgrade buildozer cython
          buildozer android update || true
          
          # البدء في البناء
          printf "y\n" | buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
